<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pobfus JS // Virtualization Studio</title>
    <style>
        :root { --bg: #0a0c10; --panel: #12151c; --brd: #2a2e3a; --acc: #f69d50; --txt: #adbac7; }
        body { background: var(--bg); color: var(--txt); font-family: 'Consolas', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { padding: 12px; background: var(--panel); border-bottom: 1px solid var(--brd); display: flex; gap: 10px; align-items: center; }
        .workspace { display: grid; grid-template-columns: 1fr 1fr; flex: 1; gap: 1px; background: var(--brd); }
        textarea { background: var(--bg); color: #768390; border: none; padding: 20px; resize: none; outline: none; font-size: 13px; }
        #out { color: var(--acc); background: #07090d; }
        .btn { padding: 8px 16px; cursor: pointer; border: 1px solid var(--brd); background: #22272e; color: white; font-size: 11px; border-radius: 4px; }
        .btn-run { background: var(--acc); color: #000; border: none; font-weight: bold; }
        .status { padding: 5px 20px; font-size: 10px; background: #000; color: var(--acc); border-top: 1px solid var(--brd); }
    </style>
</head>
<body>
    <div class="toolbar">
        <b style="color:var(--acc)">POBFUS_JS_V1.11.01</b>
        <button class="btn btn-run" id="go">VIRTUALIZE_JS</button>
        <button class="btn" id="cp">COPY_BRICK</button>
        <button class="btn" id="cl">CLEAR</button>
    </div>
    <div class="workspace">
        <textarea id="in" placeholder="// Input JavaScript Source..."></textarea>
        <textarea id="out" readonly placeholder="// Obfuscated JS Output..."></textarea>
    </div>
    <div class="status" id="st">ENGINE_STATUS: BETA</div>
    <script src="script.js"></script>
</body>
    </html>
