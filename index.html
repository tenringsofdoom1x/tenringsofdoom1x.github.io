<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pobfus // Luau Virtualization Studio</title>
    <style>
        :root { --bg: #0d1117; --sidebar: #010409; --panel: #161b22; --brd: #30363d; --acc: #58a6ff; --txt: #c9d1d9; --warn: #d29922; --err: #f85149; --succ: #3fb950; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        .info-panel { width: 300px; background: var(--sidebar); border-right: 1px solid var(--brd); display: flex; flex-direction: column; padding: 24px; box-sizing: border-box; }
        .info-header { color: var(--acc); font-weight: 600; font-size: 20px; letter-spacing: -0.5px; }
        .ver-badge { font-size: 10px; background: #238636; color: white; padding: 2px 6px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }
        .status-list { list-style: none; padding: 0; margin: 20px 0; font-size: 12px; }
        .status-list li { margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .dot { height: 8px; width: 8px; border-radius: 50%; }

        /* Main Workspace */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .toolbar { padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--brd); display: flex; gap: 12px; align-items: center; }
        .workspace { display: grid; grid-template-columns: 1fr 1fr; flex: 1; background: var(--brd); gap: 1px; }
        .editor-container { display: flex; flex-direction: column; background: var(--bg); position: relative; }
        .label { padding: 8px 16px; font-size: 11px; background: #090c10; color: #8b949e; border-bottom: 1px solid var(--brd); font-family: monospace; }
        
        textarea { flex: 1; background: transparent; color: #e6edf3; border: none; padding: 20px; resize: none; outline: none; font-family: 'SFMono-Regular', Consolas, "Liberation Mono", Menlo, monospace; font-size: 13px; line-height: 1.6; }
        #out { color: var(--warn); background: #0c0e14; }

        /* Components */
        .btn { padding: 6px 12px; cursor: pointer; border: 1px solid var(--brd); background: #21262d; color: #c9d1d9; font-size: 12px; border-radius: 6px; font-weight: 500; transition: 0.2s; }
        .btn:hover { background: #30363d; border-color: #8b949e; }
        .btn-run { background: #238636; color: white; border-color: rgba(240,246,252,0.1); }
        .btn-run:hover { background: #2ea043; }

        /* Notification System */
        #notif-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 12px 16px; background: var(--panel); border: 1px solid var(--brd); border-left: 4px solid var(--acc); color: var(--txt); font-size: 13px; border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; min-width: 250px; }
        .toast.error { border-left-color: var(--err); }
        .toast.success { border-left-color: var(--succ); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="info-panel">
        <div class="info-header">Pobfus <span class="ver-badge">v1.11.02</span></div>
        <p style="font-size: 12px; color: #8b949e;">Advanced Luau Virtualizer tailored for Roblox executors.</p>
        
        <ul class="status-list">
            <li><div class="dot" style="background:var(--succ)"></div> Anti-Hook Metatables</li>
            <li><div class="dot" style="background:var(--succ)"></div> Selective Compression</li>
            <li><div class="dot" style="background:var(--succ)"></div> Infinite-Loop Honeypot</li>
            <li><div class="dot" style="background:var(--warn)"></div> Delta/Synapse-Z Optimized</li>
        </ul>

        <div style="margin-top:auto; font-size: 11px; color: #484f58;">
            Development skipped Public Beta (0.7-0.8) for maximum decompiler interference.
        </div>
    </div>

    <div class="main-content">
        <div class="toolbar">
            <button class="btn btn-run" id="go">Obfuscate Script</button>
            <button class="btn" id="cp">Copy Output</button>
            <button class="btn" id="cl" style="margin-left:auto;">Clear</button>
        </div>

        <div class="workspace">
            <div class="editor-container">
                <div class="label">INPUT_SOURCE</div>
                <textarea id="in" spellcheck="false" placeholder="-- Paste your raw Luau script here..."></textarea>
            </div>
            <div class="editor-container">
                <div class="label">POBFUS_VIRTUAL_BRICK</div>
                <textarea id="out" readonly spellcheck="false" placeholder="-- Virtualized output will appear here..."></textarea>
            </div>
        </div>
    </div>

    <div id="notif-container"></div>
    <script src="script.js"></script>
</body>
                    </html>
