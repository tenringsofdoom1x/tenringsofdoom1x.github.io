<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POBFUS | 1.13.100</title>
    <style>
        :root {
            --gh-bg: #0d1117;
            --gh-border: #30363d;
            --gh-text: #c9d1d9;
            --rbx-log-bg: #1b1b1b;
            --p-green: #39ff14;
            --p-blue: #79c0ff;
            --p-purple: #d2a8ff;
            --p-red: #ff3131;
        }

        body {
            background-color: #010409;
            color: var(--gh-text);
            font-family: "JetBrains Mono", "Fira Code", monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER: Lua logo on the left of the title */
        header {
            background: var(--gh-bg);
            border-bottom: 1px solid var(--gh-border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #lua-logo-main {
            width: 24px;
            filter: invert(1);
        }

        /* DUAL PANES */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            border-bottom: 1px solid var(--gh-border);
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--gh-border);
        }

        .pane-label {
            background: #161b22;
            padding: 6px 15px;
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gh-border);
        }

        textarea {
            flex: 1;
            background: var(--gh-bg);
            border: none;
            padding: 15px;
            font-family: inherit;
            font-size: 13px;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        #input { color: var(--p-blue); }
        #output-view { color: var(--p-purple); background: #090c10; }

        /* ROBLOX 2017-2019 LOGS: Scrollable & Bottom-fixed */
        #steve-logs {
            height: 220px;
            background: var(--rbx-log-bg);
            border-top: 2px solid #444;
            overflow-y: auto; /* Scrollable */
            padding: 10px;
            font-family: "Consolas", monospace;
            font-size: 12px;
            color: #fff;
        }

        .log-entry { margin-bottom: 3px; white-space: pre-wrap; border-left: 2px solid transparent; }
        .log-ts { color: #888; margin-right: 10px; }

        button {
            background: #238636;
            color: white;
            border: 1px solid rgba(240,246,252,0.1);
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: 0.2s;
        }

        button:hover { background: #2ea043; }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #010409; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <div class="header-brand">
        <img id="lua-logo-main" src="https://img.icons8.com/?size=128&id=42bqS7y7Ga9o&format=png" alt="Lua">
        <span style="font-weight: bold; letter-spacing: 0.5px;">POBFUS <span style="color:#6e7681; font-weight: normal;">v1.13.100</span></span>
    </div>
    <button onclick="_011._dl()">Execute & Download</button>
</header>

<div class="workspace">
    <div class="pane">
        <div class="pane-label">Source.lua</div>
        <textarea id="input" spellcheck="false" placeholder="-- Awaiting source slop..."></textarea>
    </div>
    <div class="pane">
        <div class="pane-label">Obfuscated.lua</div>
        <textarea id="output-view" readonly placeholder="-- Encrypted payload will appear here..."></textarea>
    </div>
</div>

<div id="steve-logs"></div>

<script src="script.js"></script>
</body>
</html>
