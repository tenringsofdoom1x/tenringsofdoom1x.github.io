name: Pobfus 0.7 Hybrid

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5  # Updated to v5
        with:
          python-version: "3.10"
      - name: Syntax Check
        run: |
          # The "|| true" ensures it doesn't fail if the file is missing
          python -m py_compile main_obf.py || echo "No python file yet"

  deploy-web:
    runs-on: ubuntu-latest
    needs: python-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4  # Updated to v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # Updated to v3 (Pages uses v3 for now)
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Updated to v4        with:
          path: '.'
      - name: Deploy
        uses: actions/deploy-pages@v2
